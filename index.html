<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasolineras España</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #f5a623;
    --accent2: #4ade80;
    --danger: #f87171;
    --text: #e8eaf0;
    --muted: #8892aa;
    --panel-w: 340px;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 52px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 1000;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #btn-locate {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #0f1117;
    border: none; border-radius: var(--radius); padding: 7px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #btn-locate:hover { opacity: .85; }
  #btn-locate svg { flex-shrink: 0; }
  #status-bar {
    font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* PANEL */
  #panel {
    width: var(--panel-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .filters { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 2px; }

  /* FUEL PILLS */
  .pill {
    font-size: 12px; font-weight: 500; padding: 5px 11px;
    border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }
  .pill.active { background: var(--accent); color: #0f1117; border-color: var(--accent); }
  .pill.lowcost.active { background: var(--accent2); color: #0f1117; border-color: var(--accent2); }

  /* SORT */
  select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 6px 10px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    width: 100%; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }

  /* SEARCH BOX */
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 7px 10px 7px 32px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: var(--muted);
  }
  .search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px 4px; display: none; line-height: 1;
  }
  .search-clear.visible { display: block; }
  #search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); z-index: 2000; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.5); display: none;
  }
  #search-results.visible { display: block; }
  .search-result-item {
    padding: 9px 12px; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--border); transition: background .1s;
    display: flex; align-items: center; gap: 8px;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }
  .search-result-icon { font-size: 12px; flex-shrink: 0; }
  .search-result-name { font-weight: 500; }
  .search-result-sub { font-size: 11px; color: var(--muted); }
  .search-loading { padding: 10px 12px; font-size: 12px; color: var(--muted); text-align: center; }

  /* RADIUS SLIDER */
  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] {
    flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer;
  }
  #radius-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); min-width: 44px; text-align: right; }

  /* STATION LIST */
  #station-list { flex: 1; overflow-y: auto; padding: 8px; }
  #station-list::-webkit-scrollbar { width: 4px; }
  #station-list::-webkit-scrollbar-track { background: transparent; }
  #station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .station-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .station-card:hover { border-color: var(--accent); }
  .station-card.selected { border-color: var(--accent); background: #1e2030; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .card-dist { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .badge-lc {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    background: rgba(74,222,128,.15); color: var(--accent2);
    border: 1px solid rgba(74,222,128,.3); border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .card-prices { display: flex; flex-wrap: wrap; gap: 6px; }
  .price-tag {
    display: flex; flex-direction: column; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px; min-width: 68px;
  }
  .price-tag .fuel-name { font-size: 10px; color: var(--muted); font-weight: 500; }
  .price-tag .fuel-price { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); }
  .price-tag.cheapest .fuel-price { color: var(--accent2); }
  .price-tag.priciest .fuel-price { color: var(--danger); }

  /* EMPTY / LOADING */
  .msg-empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px; line-height: 1.7;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MAP */
  #map { flex: 1; z-index: 0; }
  .leaflet-container { background: #181c27; }
  .leaflet-tile { filter: brightness(.85) saturate(.6); }

  /* CUSTOM POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important; border-radius: var(--radius) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.5) !important; font-family: 'DM Sans', sans-serif !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .popup-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .popup-prices { display: flex; flex-wrap: wrap; gap: 6px; }
  .popup-price { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface); padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); }

  /* CLUSTER OVERRIDE */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(245,166,35,.18) !important; }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background-color: rgba(245,166,35,.7) !important; color: #0f1117 !important; font-family: 'DM Mono', monospace; font-weight: 600; }

  /* MOBILE */
  @media (max-width: 640px) {
    :root { --panel-w: 100%; }
    .main { flex-direction: column-reverse; }
    #panel { width: 100%; height: 45vh; border-right: none; border-top: 1px solid var(--border); }
    #map { height: 55vh; flex: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⛽ <span>gasolineras</span>.es</div>
  <div class="header-right">
    <span id="status-bar">Cargando datos…</span>
    <button id="btn-locate">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9"/></svg>
      Localizarme
    </button>
  </div>
</header>

<div class="main">
  <div id="panel">
    <div class="filters">

      <div style="position:relative">
        <div class="filter-label">Buscar población o dirección</div>
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="location-search" placeholder="Ej: Alicante, Calle Mayor…" autocomplete="off">
          <button class="search-clear" id="search-clear" title="Borrar">✕</button>
        </div>
        <div id="search-results"></div>
      </div>

      <div>
        <div class="filter-label">Marca</div>
        <select id="brand-select">
          <option value="">Todas las marcas</option>
        </select>
      </div>

      <div>
        <div class="filter-label">Carburante</div>
        <div class="filter-row" id="fuel-pills">
          <span class="pill active" data-fuel="G95">95 E5</span>
          <span class="pill" data-fuel="G98">98 E5</span>
          <span class="pill" data-fuel="GOA">Gasóleo A</span>
          <span class="pill" data-fuel="GLP">GLP</span>
        </div>
      </div>

      <div>
        <div class="filter-label">Opciones</div>
        <div class="filter-row">
          <span class="pill lowcost" id="toggle-lc" data-active="false">💚 Solo low-cost</span>
        </div>
      </div>

      <div>
        <div class="filter-label">Ordenar por</div>
        <select id="sort-select">
          <option value="dist">Distancia (más cercana)</option>
          <option value="price-asc">Precio (más barata)</option>
          <option value="price-desc">Precio (más cara)</option>
          <option value="name">Nombre A–Z</option>
        </select>
      </div>

      <div id="radius-wrap">
        <div class="filter-label">Radio de búsqueda: <span id="radius-val">10 km</span></div>
        <div class="slider-row">
          <span style="font-size:11px;color:var(--muted)">1</span>
          <input type="range" id="radius-slider" min="1" max="50" value="10" step="1">
          <span style="font-size:11px;color:var(--muted)">50 km</span>
        </div>
      </div>

    </div>
    <div id="station-list">
      <div class="msg-empty">
        <div class="spinner"></div>
        Descargando estaciones…<br>
        <small>(~10 MB, puede tardar unos segundos)</small>
      </div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_URL = 'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/';
const PROXY   = 'https://corsproxy.io/?url=';

const FUEL_KEYS = {
  G95: 'PrecioGasolina95E5',
  G98: 'PrecioGasolina98E5',
  GOA: 'PrecioGasoleoA',
  GLP: 'PrecioGLP'
};
const FUEL_LABELS = { G95: '95 E5', G98: '98 E5', GOA: 'Gasóleo A', GLP: 'GLP' };

const LOW_COST_BRANDS = [
  'PLENOIL','PETROPRIX','BALLENOIL','PUMPING','MEROIL','ESSO','OIL LOW COST',
  'LOWCOSTFUEL','GASGAS','GASCAT','LOWCOST','PRIMEGAS','ECONOGAS','BEGAS'
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let allStations = [];
let userLatLng  = null;
let activeFuel  = 'G95';
let onlyLC      = false;
let sortMode    = 'dist';
let radiusKm    = 10;
let markers     = {};
let selectedId  = null;
let activeBrand = '';
let searchDebounce = null;

// ─── MAP ──────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([40.4, -3.7], 6);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const clusterGroup = L.markerClusterGroup({ disableClusteringAtZoom: 14, maxClusterRadius: 60 });
map.addLayer(clusterGroup);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.4);box-shadow:0 0 6px ${color}88;"></div>`,
    iconSize: [12,12], iconAnchor: [6,6]
  });
}

const iconNormal  = makeIcon('#f5a623');
const iconLC      = makeIcon('#4ade80');
const iconSelect  = makeIcon('#60a5fa');
const iconUser    = L.divIcon({
  className: '',
  html: `<div style="width:16px;height:16px;border-radius:50%;background:#60a5fa;border:3px solid #fff;box-shadow:0 0 12px #60a5fa;"></div>`,
  iconSize:[16,16], iconAnchor:[8,8]
});

let userMarker = null;

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function loadStations() {
  try {
    const res  = await fetch(PROXY + encodeURIComponent(API_URL));
    const json = await res.json();

    allStations = (json.ListaEESSPrecio || [])
      .map((s, i) => {
        const lat = parseFloat(s['Latitud']?.replace(',','.'));
        const lng = parseFloat(s['Longitud (WGS84)']?.replace(',','.'));
        if (!lat || !lng) return null;

        const prices = {};
        for (const [key, field] of Object.entries(FUEL_KEYS)) {
          const raw = s[field];
          prices[key] = raw && raw.trim() !== '' ? parseFloat(raw.replace(',','.')) : null;
        }
        const rotulo = (s['Rótulo'] || '').toUpperCase().trim();
        const isLC   = LOW_COST_BRANDS.some(b => rotulo.includes(b));

        return { id: i, lat, lng, name: s['Rótulo'] || 'Sin nombre',
          address: s['Dirección'] || '', locality: s['Localidad'] || '',
          schedule: s['Horario'] || '', prices, isLC, dist: null };
      })
      .filter(Boolean);

    populateBrands();
    setStatus(`${allStations.length.toLocaleString('es-ES')} estaciones cargadas`);
    renderAll();
  } catch (e) {
    setStatus('Error al cargar datos');
    document.getElementById('station-list').innerHTML =
      `<div class="msg-empty">❌ No se pudieron cargar los datos.<br><small>${e.message}</small></div>`;
  }
}

// ─── DISTANCE ─────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateDistances() {
  if (!userLatLng) return;
  allStations.forEach(s => { s.dist = haversine(userLatLng.lat, userLatLng.lng, s.lat, s.lng); });
}

// ─── FILTER & SORT ────────────────────────────────────────────────────────────
function getVisible() {
  let list = allStations.filter(s => s.prices[activeFuel] !== null);
  if (onlyLC) list = list.filter(s => s.isLC);
  if (activeBrand) list = list.filter(s => s.name.toUpperCase().trim() === activeBrand);
  if (userLatLng) list = list.filter(s => s.dist !== null && s.dist <= radiusKm);

  if (sortMode === 'dist' && userLatLng) list.sort((a,b) => a.dist - b.dist);
  else if (sortMode === 'price-asc') list.sort((a,b) => a.prices[activeFuel] - b.prices[activeFuel]);
  else if (sortMode === 'price-desc') list.sort((a,b) => b.prices[activeFuel] - a.prices[activeFuel]);
  else list.sort((a,b) => a.name.localeCompare(b.name));

  return list;
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────
function renderList(stations) {
  const el = document.getElementById('station-list');
  if (!stations.length) {
    el.innerHTML = `<div class="msg-empty">Sin resultados.<br><small>Prueba a ampliar el radio o cambiar los filtros.</small></div>`;
    return;
  }

  const prices = stations.map(s => s.prices[activeFuel]).filter(Boolean);
  const minP = Math.min(...prices), maxP = Math.max(...prices);

  el.innerHTML = '';
  stations.slice(0, 150).forEach(s => {
    const p = s.prices[activeFuel];
    const isCheap  = p === minP;
    const isPricey = p === maxP;
    const distStr  = s.dist !== null ? `${s.dist.toFixed(1)} km` : '';

    const card = document.createElement('div');
    card.className = 'station-card' + (s.id === selectedId ? ' selected' : '');
    card.dataset.id = s.id;
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-name">${s.name}</div>
          ${distStr ? `<div class="card-dist">${distStr} · ${s.locality}</div>` : `<div class="card-dist">${s.locality}</div>`}
        </div>
        ${s.isLC ? '<span class="badge-lc">LOW COST</span>' : ''}
      </div>
      <div class="card-prices">
        <div class="price-tag ${isCheap ? 'cheapest' : isPricey ? 'priciest' : ''}">
          <span class="fuel-name">${FUEL_LABELS[activeFuel]}</span>
          <span class="fuel-price">${p.toFixed(3)} €</span>
        </div>
        ${Object.entries(FUEL_LABELS).filter(([k]) => k !== activeFuel).map(([k,label]) => {
          const v = s.prices[k];
          return v ? `<div class="price-tag"><span class="fuel-name">${label}</span><span class="fuel-price">${v.toFixed(3)} €</span></div>` : '';
        }).join('')}
      </div>`;

    card.addEventListener('click', () => selectStation(s));
    el.appendChild(card);
  });

  if (stations.length > 150) {
    const note = document.createElement('div');
    note.className = 'msg-empty';
    note.innerHTML = `Mostrando 150 de ${stations.length}.<br><small>Reduce el radio o filtra para ver más.</small>`;
    el.appendChild(note);
  }
}

// ─── RENDER MAP ───────────────────────────────────────────────────────────────
function renderMap(stations) {
  clusterGroup.clearLayers();
  markers = {};

  stations.forEach(s => {
    const icon = s.id === selectedId ? iconSelect : (s.isLC ? iconLC : iconNormal);
    const m = L.marker([s.lat, s.lng], { icon });

    m.bindPopup(() => {
      const priceRows = Object.entries(FUEL_LABELS).map(([k,label]) => {
        const v = s.prices[k];
        return v ? `<span class="popup-price">${label} ${v.toFixed(3)} €</span>` : '';
      }).join('');
      return `<div class="popup-name">${s.name}</div><div style="font-size:11px;color:var(--muted);margin-bottom:8px">${s.address}, ${s.locality}</div><div class="popup-prices">${priceRows}</div>`;
    });

    m.on('click', () => selectStation(s));
    markers[s.id] = m;
    clusterGroup.addLayer(m);
  });
}

function renderAll() {
  const visible = getVisible();
  renderList(visible);
  renderMap(visible);
}

// ─── SELECT ───────────────────────────────────────────────────────────────────
function selectStation(s) {
  selectedId = s.id;

  // Update card highlight
  document.querySelectorAll('.station-card').forEach(c => {
    c.classList.toggle('selected', parseInt(c.dataset.id) === s.id);
  });

  // Fly map
  map.flyTo([s.lat, s.lng], 15, { duration: 1 });
  const m = markers[s.id];
  if (m) {
    clusterGroup.zoomToShowLayer(m, () => m.openPopup());
  }
}

// ─── GEOLOCATION ──────────────────────────────────────────────────────────────
function locate() {
  setStatus('Obteniendo ubicación…');
  navigator.geolocation.getCurrentPosition(pos => {
    userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (userMarker) userMarker.remove();
    userMarker = L.marker([userLatLng.lat, userLatLng.lng], { icon: iconUser, zIndexOffset: 1000 })
      .addTo(map).bindPopup('Tu ubicación').openPopup();
    map.flyTo([userLatLng.lat, userLatLng.lng], 12, { duration: 1.5 });
    updateDistances();
    if (sortMode === 'dist') renderAll();
    else renderAll();
    setStatus(`Ubicación activa · radio ${radiusKm} km`);
  }, () => {
    setStatus('No se pudo obtener ubicación');
    alert('Activa el permiso de ubicación en tu navegador.');
  }, { enableHighAccuracy: true });
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('btn-locate').addEventListener('click', locate);

document.getElementById('fuel-pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill[data-fuel]');
  if (!pill) return;
  document.querySelectorAll('#fuel-pills .pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeFuel = pill.dataset.fuel;
  renderAll();
});

document.getElementById('toggle-lc').addEventListener('click', function() {
  onlyLC = !onlyLC;
  this.dataset.active = onlyLC;
  this.classList.toggle('active', onlyLC);
  renderAll();
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  renderAll();
});

document.getElementById('radius-slider').addEventListener('input', e => {
  radiusKm = parseInt(e.target.value);
  document.getElementById('radius-val').textContent = radiusKm + ' km';
  if (userLatLng) renderAll();
});

// ─── POPULATE BRANDS ──────────────────────────────────────────────────────────
function populateBrands() {
  const brands = [...new Set(allStations.map(s => s.name.toUpperCase().trim()))]
    .filter(Boolean).sort((a, b) => a.localeCompare(b, 'es'));
  const sel = document.getElementById('brand-select');
  brands.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b.charAt(0) + b.slice(1).toLowerCase();
    sel.appendChild(opt);
  });
}

// ─── LOCATION SEARCH (Nominatim) ──────────────────────────────────────────────
const searchInput   = document.getElementById('location-search');
const searchResults = document.getElementById('search-results');
const searchClear   = document.getElementById('search-clear');

async function searchLocation(q) {
  if (q.length < 2) { hideSearchResults(); return; }
  searchResults.innerHTML = '<div class="search-loading">Buscando…</div>';
  searchResults.classList.add('visible');
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=es&limit=6&format=json&addressdetails=1`;
    const res  = await fetch(url, { headers: { 'Accept-Language': 'es' } });
    const data = await res.json();
    if (!data.length) {
      searchResults.innerHTML = '<div class="search-loading">Sin resultados</div>';
      return;
    }
    searchResults.innerHTML = '';
    data.forEach(r => {
      const name = r.display_name.split(',').slice(0, 3).join(', ');
      const type = r.type || r.class || '';
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `
        <span class="search-result-icon">📍</span>
        <div>
          <div class="search-result-name">${name}</div>
          <div class="search-result-sub">${type}</div>
        </div>`;
      item.addEventListener('click', () => {
        const lat = parseFloat(r.lat), lng = parseFloat(r.lon);
        userLatLng = { lat, lng };
        updateDistances();
        map.flyTo([lat, lng], 13, { duration: 1.2 });
        if (userMarker) userMarker.remove();
        userMarker = L.marker([lat, lng], { icon: iconUser, zIndexOffset: 1000 })
          .addTo(map).bindPopup(r.display_name.split(',')[0]).openPopup();
        searchInput.value = r.display_name.split(',').slice(0,2).join(', ');
        searchClear.classList.add('visible');
        hideSearchResults();
        setStatus(`Mostrando radio ${radiusKm} km · ${r.display_name.split(',')[0]}`);
        renderAll();
      });
      searchResults.appendChild(item);
    });
  } catch {
    searchResults.innerHTML = '<div class="search-loading">Error de conexión</div>';
  }
}

function hideSearchResults() {
  searchResults.classList.remove('visible');
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => searchLocation(q), 350);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSearchResults();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  hideSearchResults();
  userLatLng = null;
  if (userMarker) { userMarker.remove(); userMarker = null; }
  allStations.forEach(s => s.dist = null);
  setStatus(`${allStations.length.toLocaleString('es-ES')} estaciones cargadas`);
  renderAll();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#panel > .filters > div:first-child')) hideSearchResults();
});

// ─── BRAND FILTER ─────────────────────────────────────────────────────────────
document.getElementById('brand-select').addEventListener('change', e => {
  activeBrand = e.target.value;
  renderAll();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadStations();
</script>
