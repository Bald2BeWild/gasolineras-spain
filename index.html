<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasolineras España</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#f5a623;--accent2:#4ade80;--danger:#f87171;--info:#60a5fa;
  --text:#e8eaf0;--muted:#8892aa;--panel-w:340px;--radius:10px;
  --popup-shadow:0 8px 24px rgba(0,0,0,.5);
}
body.light{
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#e8ebf2;--border:#d0d5e8;
  --text:#1a1d27;--muted:#6b7494;--popup-shadow:0 8px 24px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;transition:background .2s,color .2s}

/* HEADER */
header{display:flex;align-items:center;gap:12px;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1000}
.logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent);letter-spacing:-.5px}
.logo span{color:var(--text)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#status-bar{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.hbtn{display:flex;align-items:center;gap:6px;border:none;border-radius:var(--radius);padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
#btn-locate{background:var(--accent);color:#0f1117}
#btn-locate:hover{opacity:.85}
#btn-theme{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:7px 10px;font-size:16px}
#btn-theme:hover{border-color:var(--accent)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* PANEL TABS */
#panel{width:var(--panel-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:10px 0;font-size:12px;font-weight:600;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-pane.active{display:flex}

/* FILTERS */
.filters{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:62vh}
.filters::-webkit-scrollbar{width:3px}
.filters::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.filter-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}

.pill{font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pill.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.pill.lc-pill.active{background:var(--accent2);color:#0f1117;border-color:var(--accent2)}

/* BRAND SEARCH */
.brand-wrap{position:relative}
.brand-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:6px 28px 6px 30px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.brand-wrap input:focus{border-color:var(--accent)}
.brand-wrap input::placeholder{color:var(--muted)}
.brand-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
#brand-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);z-index:3000;max-height:200px;overflow-y:auto;box-shadow:var(--popup-shadow);display:none}
#brand-dropdown.visible{display:block}
#brand-dropdown::-webkit-scrollbar{width:3px}
#brand-dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.brand-opt{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.brand-opt:last-child{border-bottom:none}
.brand-opt:hover{background:var(--surface2)}
.brand-opt.selected{color:var(--accent);font-weight:600;background:var(--surface2)}
#brand-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;display:none;line-height:1}
#brand-clear.visible{display:block}

select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:6px 10px;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;accent-color:var(--accent);height:4px;cursor:pointer}
#radius-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);min-width:44px;text-align:right}

/* LOCATION SEARCH */
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 28px 7px 32px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;display:none;line-height:1}
.search-clear.visible{display:block}
#search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);z-index:2000;overflow:hidden;box-shadow:var(--popup-shadow);display:none}
#search-results.visible{display:block}
.search-result-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;align-items:center;gap:8px}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--surface2)}
.search-result-name{font-weight:500;font-size:13px}
.search-result-sub{font-size:11px;color:var(--muted)}
.search-loading{padding:10px 12px;font-size:12px;color:var(--muted);text-align:center}

/* LIST */
#list-header{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#result-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
#btn-clear-filters{font-size:11px;background:none;border:none;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;padding:2px 4px}
#station-list{flex:1;overflow-y:auto;padding:8px}
#station-list::-webkit-scrollbar{width:4px}
#station-list::-webkit-scrollbar-track{background:transparent}
#station-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.station-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.station-card:hover{border-color:var(--accent)}
.station-card.selected{border-color:var(--accent)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:600;line-height:1.3}
.card-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.badge-lc{font-size:10px;font-weight:600;padding:2px 7px;background:rgba(74,222,128,.15);color:var(--accent2);border:1px solid rgba(74,222,128,.3);border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-prices{display:flex;flex-wrap:wrap;gap:5px}
.price-tag{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 9px;min-width:64px}
.price-tag .fuel-name{font-size:10px;color:var(--muted);font-weight:500}
.price-tag .fuel-price{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text)}
.price-tag.cheapest .fuel-price{color:var(--accent2)}
.price-tag.priciest .fuel-price{color:var(--danger)}

/* STATS TAB */
#stats-pane{padding:14px;overflow-y:auto;gap:14px}
#stats-pane::-webkit-scrollbar{width:3px}
#stats-pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.stats-section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.stat-card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.stat-fuel-name{font-size:13px;font-weight:600}
.stat-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.stat-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.stat-pill{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;flex:1;min-width:70px}
.stat-pill-label{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:2px}
.stat-pill-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.stat-pill-val.green{color:var(--accent2)}
.stat-pill-val.amber{color:var(--accent)}
.stat-pill-val.red{color:var(--danger)}
/* mini sparkline chart */
.sparkline-wrap{position:relative;height:52px;width:100%}
canvas.sparkline{width:100%;height:52px;display:block}
.spark-labels{display:flex;justify-content:space-between;margin-top:2px}
.spark-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.stats-note{font-size:11px;color:var(--muted);line-height:1.6;padding:10px 0 4px}
#btn-clear-history{font-size:11px;background:none;border:none;color:var(--danger);cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;margin-top:4px}

/* EMPTY / SPINNER */
.msg-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.7}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAP */
#map{flex:1;z-index:0}
.leaflet-container{background:#181c27}
body.light .leaflet-container{background:#e8ecf0}
body.light .leaflet-tile{filter:brightness(1) saturate(1)}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:var(--popup-shadow)!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--surface2)!important}
.leaflet-popup-content{margin:12px 14px!important}
.popup-name{font-size:13px;font-weight:600;margin-bottom:6px}
.popup-addr{font-size:11px;color:var(--muted);margin-bottom:8px}
.popup-prices{display:flex;flex-wrap:wrap;gap:5px}
.popup-price{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface);padding:3px 8px;border-radius:5px;border:1px solid var(--border)}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background-color:rgba(245,166,35,.18)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background-color:rgba(245,166,35,.7)!important;color:#0f1117!important;font-family:'DM Mono',monospace;font-weight:600}

@media(max-width:640px){
  :root{--panel-w:100%}
  .main{flex-direction:column-reverse}
  #panel{width:100%;height:52vh;border-right:none;border-top:1px solid var(--border)}
  #map{height:48vh;flex:none}
  .filters{max-height:36vh}
  #status-bar{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">⛽ <span>gasolineras</span>.es</div>
  <div class="header-right">
    <span id="status-bar">Cargando datos…</span>
    <button class="hbtn" id="btn-theme" title="Cambiar tema">🌙</button>
    <button class="hbtn" id="btn-locate">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="9"/></svg>
      Localizarme
    </button>
  </div>
</header>

<div class="main">
  <div id="panel">

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="map-tab">🗺 Mapa</button>
      <button class="tab-btn" data-tab="stats-tab">📊 Precios</button>
    </div>

    <!-- TAB: MAP -->
    <div class="tab-pane active" id="map-tab">
      <div class="filters">

        <div style="position:relative">
          <div class="filter-label">Buscar población o dirección</div>
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="location-search" placeholder="Ej: Alicante, Madrid…" autocomplete="off">
            <button class="search-clear" id="search-clear">✕</button>
          </div>
          <div id="search-results"></div>
        </div>

        <div>
          <div class="filter-label">Marca</div>
          <div class="brand-wrap">
            <svg class="brand-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="brand-input" placeholder="Todas las marcas" autocomplete="off">
            <button id="brand-clear">✕</button>
            <div id="brand-dropdown"></div>
          </div>
        </div>

        <div>
          <div class="filter-label">Carburante (selección múltiple)</div>
          <div class="filter-row" id="fuel-pills">
            <span class="pill active" data-fuel="G95">95 E5</span>
            <span class="pill active" data-fuel="G98">98 E5</span>
            <span class="pill active" data-fuel="GOA">Gasóleo A</span>
            <span class="pill active" data-fuel="GOP">Gasóleo P</span>
            <span class="pill active" data-fuel="GLP">GLP</span>
          </div>
        </div>

        <div>
          <div class="filter-label">Opciones</div>
          <div class="filter-row">
            <span class="pill lc-pill" id="toggle-lc">Solo low-cost</span>
          </div>
        </div>

        <div>
          <div class="filter-label">Ordenar por</div>
          <select id="sort-select">
            <option value="dist">Distancia (más cercana)</option>
            <option value="price-asc">Precio (más barata)</option>
            <option value="price-desc">Precio (más cara)</option>
            <option value="name">Nombre A–Z</option>
          </select>
        </div>

        <div>
          <div class="filter-label">Radio de búsqueda: <span id="radius-val">10 km</span></div>
          <div class="slider-row">
            <span style="font-size:11px;color:var(--muted)">1</span>
            <input type="range" id="radius-slider" min="1" max="50" value="10" step="1">
            <span style="font-size:11px;color:var(--muted)">50 km</span>
          </div>
        </div>

      </div>

      <div id="list-header">
        <span id="result-count"></span>
        <button id="btn-clear-filters">Limpiar filtros</button>
      </div>

      <div id="station-list">
        <div class="msg-empty">
          <div class="spinner"></div>
          Descargando estaciones…<br>
          <small>(~10 MB, puede tardar unos segundos)</small>
        </div>
      </div>
    </div>

    <!-- TAB: STATS -->
    <div class="tab-pane" id="stats-tab">
      <div id="stats-pane">
        <div class="msg-empty">
          <div class="spinner"></div>
          Esperando datos…
        </div>
      </div>
    </div>

  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_URL = 'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/';
const PROXY   = 'https://corsproxy.io/?url=';
const HISTORY_KEY = 'gasolineras_price_history';
const MAX_HISTORY_DAYS = 30;

const FUEL_KEYS = {
  G95: 'Precio Gasolina 95 E5',
  G98: 'Precio Gasolina 98 E5',
  GOA: 'Precio Gasoleo A',
  GOP: 'Precio Gasoleo Premium',
  GLP: 'Precio Gases licuados del petróleo'
};
const FUEL_LABELS  = { G95:'95 E5', G98:'98 E5', GOA:'Gasóleo A', GOP:'Gasóleo P', GLP:'GLP' };
const FUEL_COLORS  = { G95:'#f5a623', G98:'#f87171', GOA:'#60a5fa', GOP:'#a78bfa', GLP:'#4ade80' };

const LOW_COST_BRANDS = ['PLENOIL','PETROPRIX','BALLENOIL','PUMPING','MEROIL','ESSO',
  'OIL LOW COST','LOWCOSTFUEL','GASGAS','GASCAT','LOWCOST','PRIMEGAS','ECONOGAS','BEGAS'];

const BRAND_ALIASES = {
  'CEPSA':'CEPSA','REPSOL':'REPSOL','BP':'BP','SHELL':'SHELL','GALP':'GALP',
  'CAMPSA':'CAMPSA','PETRONOR':'PETRONOR','TOTAL':'TOTAL','PLENOIL':'PLENOIL',
  'PETROPRIX':'PETROPRIX','BALLENOIL':'BALLENOIL','PUMPING':'PUMPING','MEROIL':'MEROIL',
  'DISA':'DISA','AGIP':'AGIP','AVIA':'AVIA','TAMOIL':'TAMOIL','Q8':'Q8',
  'TEXACO':'TEXACO','CARREFOUR':'CARREFOUR','EROSKI':'EROSKI','ALCAMPO':'ALCAMPO',
  'MAKRO':'MAKRO','MERCADONA':'MERCADONA','LIDL':'LIDL','MOEWE':'MOEWE',
  'GASCAT':'GASCAT','PRIMEGAS':'PRIMEGAS','BEGAS':'BEGAS',
};

function extractBrand(rotulo) {
  let r = rotulo.toUpperCase().trim().replace(/^["'*.\-\s]+|["'*.\-\s]+$/g,'');
  if (!r || r.length < 2 || /^[^A-Z0-9]/.test(r)) return null;
  for (const [key,alias] of Object.entries(BRAND_ALIASES)) {
    if (r === key || r.startsWith(key+' ') || r.startsWith(key+'-')) return alias;
  }
  const first = r.split(/[\s\-\/]/)[0].replace(/["']/g,'');
  return (first.length >= 2 && /[A-Z0-9]/.test(first)) ? first : null;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let allStations = [], userLatLng = null;
let activeFuels = new Set(['G95','G98','GOA','GOP','GLP']);
let onlyLC = false, sortMode = 'dist', radiusKm = 10, activeBrand = '';
let selectedId = null, markers = {}, allBrands = [];
let searchDebounce = null, mapDebounce = null, isDark = true;

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:false}).setView([40.4,-3.7],6);
L.control.zoom({position:'bottomright'}).addTo(map);
const tileDark  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',subdomains:'abcd',maxZoom:19});
const tileLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',subdomains:'abcd',maxZoom:19});
tileDark.addTo(map);
const clusterGroup = L.markerClusterGroup({disableClusteringAtZoom:14,maxClusterRadius:60});
map.addLayer(clusterGroup);
const makeIcon = c => L.divIcon({className:'',html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.5);box-shadow:0 0 6px ${c}88"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
const iconNormal=makeIcon('#f5a623'),iconLC=makeIcon('#4ade80'),iconSelect=makeIcon('#60a5fa');
const iconUser=L.divIcon({className:'',html:`<div style="width:16px;height:16px;border-radius:50%;background:#60a5fa;border:3px solid #fff;box-shadow:0 0 12px #60a5fa"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
let userMarker=null;

map.on('moveend zoomend',()=>{
  clearTimeout(mapDebounce);
  mapDebounce=setTimeout(()=>{if(allStations.length)renderAll();},250);
});

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function loadStations() {
  try {
    const res  = await fetch(PROXY + encodeURIComponent(API_URL));
    const json = await res.json();
    allStations = (json.ListaEESSPrecio||[]).map((s,i)=>{
      const lat=parseFloat(s['Latitud']?.replace(',','.'));
      const lng=parseFloat(s['Longitud (WGS84)']?.replace(',','.'));
      if(!lat||!lng) return null;
      const prices={};
      for(const [key,field] of Object.entries(FUEL_KEYS)){
        let raw=s[field];
        if(raw===undefined){
          const alt=Object.keys(s).find(k=>k.toLowerCase().replace(/\s/g,'')=== field.toLowerCase().replace(/\s/g,''));
          raw=alt?s[alt]:undefined;
        }
        prices[key]=(raw&&raw.trim()!=='')?parseFloat(raw.replace(',','.')):null;
      }
      const rotulo=(s['Rótulo']||'').toUpperCase().trim();
      const isLC=LOW_COST_BRANDS.some(b=>rotulo.includes(b));
      const brand=extractBrand(s['Rótulo']||'')||'Otras';
      return {id:i,lat,lng,name:s['Rótulo']||'Sin nombre',address:s['Dirección']||'',locality:s['Localidad']||'',prices,isLC,brand,dist:null};
    }).filter(Boolean);

    populateBrands();
    saveHistorySnapshot();
    setStatus(`${allStations.length.toLocaleString('es-ES')} estaciones cargadas`);
    renderAll();
    renderStats();
  } catch(e) {
    setStatus('Error al cargar datos');
    document.getElementById('station-list').innerHTML=`<div class="msg-empty">❌ No se pudieron cargar los datos.<br><small>${e.message}</small></div>`;
  }
}

// ── DISTANCE ──────────────────────────────────────────────────────────────────
function haversine(la1,ln1,la2,ln2){
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function updateDistances(){if(userLatLng)allStations.forEach(s=>{s.dist=haversine(userLatLng.lat,userLatLng.lng,s.lat,s.lng)});}

// ── FILTER ────────────────────────────────────────────────────────────────────
function getVisible(){
  if(userLatLng) updateDistances();
  const bounds=map.getBounds();
  let list=allStations.filter(s=>{
    const hasFuel=[...activeFuels].some(f=>{const p=s.prices[f];return p!==null&&p!==undefined&&!isNaN(p)&&p>0});
    if(!hasFuel) return false;
    if(onlyLC&&!s.isLC) return false;
    if(activeBrand&&s.brand!==activeBrand) return false;
    if(userLatLng) return s.dist!==null&&s.dist<=radiusKm;
    return bounds.contains([s.lat,s.lng]);
  });
  if(sortMode==='dist'&&userLatLng) list.sort((a,b)=>a.dist-b.dist);
  else if(sortMode==='price-asc') list.sort((a,b)=>{
    const pa=Math.min(...[...activeFuels].map(f=>a.prices[f]||Infinity));
    const pb=Math.min(...[...activeFuels].map(f=>b.prices[f]||Infinity));
    return pa-pb;
  });
  else if(sortMode==='price-desc') list.sort((a,b)=>{
    const pa=Math.min(...[...activeFuels].map(f=>a.prices[f]||0));
    const pb=Math.min(...[...activeFuels].map(f=>b.prices[f]||0));
    return pb-pa;
  });
  else list.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  return list;
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(stations){
  const el=document.getElementById('station-list');
  if(!stations.length){el.innerHTML=`<div class="msg-empty">Sin resultados.<br><small>Mueve el mapa, amplía el radio o cambia los filtros.</small></div>`;return;}
  const minMax={};
  for(const f of activeFuels){
    const vals=stations.map(s=>s.prices[f]).filter(v=>v!==null&&v>0);
    if(vals.length) minMax[f]={min:Math.min(...vals),max:Math.max(...vals)};
  }
  el.innerHTML='';
  stations.slice(0,150).forEach(s=>{
    const distStr=s.dist!==null?`${s.dist.toFixed(1)} km · `:'';
    const activeTags=[...activeFuels].map(f=>{
      const p=s.prices[f]; if(!p) return '';
      const cheap=minMax[f]&&p===minMax[f].min,pricey=minMax[f]&&p===minMax[f].max;
      return `<div class="price-tag ${cheap?'cheapest':pricey?'priciest':''}"><span class="fuel-name">${FUEL_LABELS[f]}</span><span class="fuel-price">${p.toFixed(3)} €</span></div>`;
    }).join('');
    const extraTags=Object.entries(FUEL_LABELS).filter(([k])=>!activeFuels.has(k)).map(([k,label])=>{
      const p=s.prices[k];
      return p?`<div class="price-tag"><span class="fuel-name">${label}</span><span class="fuel-price">${p.toFixed(3)} €</span></div>`:'';
    }).join('');
    const card=document.createElement('div');
    card.className='station-card'+(s.id===selectedId?' selected':'');
    card.dataset.id=s.id;
    card.innerHTML=`<div class="card-top"><div><div class="card-name">${s.name}</div><div class="card-dist">${distStr}${s.locality}</div></div>${s.isLC?'<span class="badge-lc">LOW COST</span>':''}</div><div class="card-prices">${activeTags}${extraTags}</div>`;
    card.addEventListener('click',()=>selectStation(s));
    el.appendChild(card);
  });
  if(stations.length>150){
    const n=document.createElement('div');n.className='msg-empty';n.style.padding='12px 20px';
    n.innerHTML=`Mostrando 150 de ${stations.length}.<br><small>Acerca el mapa o reduce el radio para ver más.</small>`;
    el.appendChild(n);
  }
}

// ── RENDER MAP ────────────────────────────────────────────────────────────────
function renderMap(stations){
  clusterGroup.clearLayers();markers={};
  const toRender=userLatLng?stations:stations.slice(0,800);
  toRender.forEach(s=>{
    const icon=s.id===selectedId?iconSelect:(s.isLC?iconLC:iconNormal);
    const m=L.marker([s.lat,s.lng],{icon});
    m.bindPopup(()=>{
      const rows=[...activeFuels].map(f=>{const p=s.prices[f];return p?`<span class="popup-price">${FUEL_LABELS[f]} ${p.toFixed(3)} €</span>`:''}).join('');
      return `<div class="popup-name">${s.name}</div><div class="popup-addr">${s.address}, ${s.locality}</div><div class="popup-prices">${rows}</div>`;
    });
    m.on('click',()=>selectStation(s));
    markers[s.id]=m;clusterGroup.addLayer(m);
  });
}

function renderAll(){
  const visible=getVisible();
  document.getElementById('result-count').textContent=`${visible.length.toLocaleString('es-ES')} estaciones`;
  renderList(visible);renderMap(visible);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function getHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch{return [];}
}

function saveHistorySnapshot(){
  if(!allStations.length) return;
  const today=new Date().toISOString().slice(0,10);
  const snap={date:today,fuels:{}};
  for(const [key] of Object.entries(FUEL_KEYS)){
    const vals=allStations.map(s=>s.prices[key]).filter(v=>v&&v>0);
    if(!vals.length) continue;
    snap.fuels[key]={
      avg: parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(3)),
      min: parseFloat(Math.min(...vals).toFixed(3)),
      max: parseFloat(Math.max(...vals).toFixed(3)),
      count: vals.length
    };
  }
  const history=getHistory().filter(h=>h.date!==today); // replace today if exists
  history.push(snap);
  // Keep only last MAX_HISTORY_DAYS
  const trimmed=history.slice(-MAX_HISTORY_DAYS);
  try{localStorage.setItem(HISTORY_KEY,JSON.stringify(trimmed));}catch{}
}

// ── RENDER STATS ──────────────────────────────────────────────────────────────
function renderStats(){
  const pane=document.getElementById('stats-pane');
  if(!allStations.length){
    pane.innerHTML='<div class="msg-empty">Esperando datos…</div>';
    return;
  }
  const history=getHistory();
  const today=history[history.length-1];
  if(!today){pane.innerHTML='<div class="msg-empty">Sin datos todavía.</div>';return;}

  let html=`<div class="stats-section-title">Precio medio hoy en España</div>`;

  for(const [key,label] of Object.entries(FUEL_LABELS)){
    const d=today.fuels[key];
    if(!d) continue;

    // Sparkline data — last N days for this fuel
    const sparkData=history.map(h=>h.fuels[key]?.avg).filter(Boolean);
    const sparkMin=Math.min(...sparkData), sparkMax=Math.max(...sparkData);
    const sparkRange=sparkMax-sparkMin||0.01;

    // Trend: compare today vs yesterday
    const yesterday=history.length>=2?history[history.length-2]:null;
    const prevAvg=yesterday?.fuels[key]?.avg;
    const trend=prevAvg!=null?(d.avg-prevAvg):0;
    const trendStr=trend===0?'=' : (trend>0?`▲ +${trend.toFixed(3)}`:`▼ ${trend.toFixed(3)}`);
    const trendColor=trend===0?'amber':trend>0?'red':'green';

    const canvasId=`spark-${key}`;
    html+=`
    <div class="stat-card">
      <div class="stat-card-header">
        <span class="stat-fuel-name" style="color:${FUEL_COLORS[key]}">${label}</span>
        <span class="stat-date">${today.date} · <span style="color:var(--${trendColor==='red'?'danger':trendColor==='green'?'accent2':'accent'})">${trendStr}</span></span>
      </div>
      <div class="stat-row">
        <div class="stat-pill"><span class="stat-pill-label">Media</span><span class="stat-pill-val amber">${d.avg.toFixed(3)} €</span></div>
        <div class="stat-pill"><span class="stat-pill-label">Mínima</span><span class="stat-pill-val green">${d.min.toFixed(3)} €</span></div>
        <div class="stat-pill"><span class="stat-pill-label">Máxima</span><span class="stat-pill-val red">${d.max.toFixed(3)} €</span></div>
        <div class="stat-pill"><span class="stat-pill-label">Estaciones</span><span class="stat-pill-val">${d.count.toLocaleString('es-ES')}</span></div>
      </div>
      ${sparkData.length > 1 ? `
      <div class="sparkline-wrap">
        <canvas class="sparkline" id="${canvasId}" height="52"></canvas>
      </div>
      <div class="spark-labels">
        <span class="spark-label">${history.find(h=>h.fuels[key])?.date?.slice(5)||''}</span>
        <span class="spark-label">${sparkData.length} días</span>
        <span class="spark-label">${today.date.slice(5)}</span>
      </div>` : `<div class="stats-note">El histórico se irá acumulando con cada visita.</div>`}
    </div>`;
  }

  html+=`<div class="stats-note">Los datos se guardan localmente en tu navegador con cada visita. Máximo ${MAX_HISTORY_DAYS} días.</div>
  <button id="btn-clear-history">🗑 Borrar histórico</button>`;

  pane.innerHTML=html;

  // Draw sparklines
  for(const [key] of Object.entries(FUEL_LABELS)){
    const sparkData=history.map(h=>h.fuels[key]?.avg).filter(Boolean);
    if(sparkData.length<2) continue;
    const canvas=document.getElementById(`spark-${key}`);
    if(!canvas) continue;
    drawSparkline(canvas, sparkData, FUEL_COLORS[key]);
  }

  document.getElementById('btn-clear-history')?.addEventListener('click',()=>{
    if(confirm('¿Borrar todo el histórico de precios guardado?')){
      localStorage.removeItem(HISTORY_KEY);
      renderStats();
    }
  });
}

function drawSparkline(canvas, data, color){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.offsetWidth||canvas.parentElement.offsetWidth||280;
  const h=52;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const min=Math.min(...data), max=Math.max(...data), range=max-min||0.01;
  const pad={t:6,b:6,l:4,r:4};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;

  // Gradient fill
  const grad=ctx.createLinearGradient(0,pad.t,0,h-pad.b);
  grad.addColorStop(0,color+'55');
  grad.addColorStop(1,color+'08');

  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad.l+(i/(data.length-1))*iw;
    const y=pad.t+(1-(v-min)/range)*ih;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  // Close path for fill
  ctx.lineTo(pad.l+iw, h-pad.b);
  ctx.lineTo(pad.l, h-pad.b);
  ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad.l+(i/(data.length-1))*iw;
    const y=pad.t+(1-(v-min)/range)*ih;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();

  // Last point dot
  const lx=pad.l+iw, lv=data[data.length-1];
  const ly=pad.t+(1-(lv-min)/range)*ih;
  ctx.beginPath(); ctx.arc(lx,ly,3,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
}

// ── SELECT ────────────────────────────────────────────────────────────────────
function selectStation(s){
  selectedId=s.id;
  document.querySelectorAll('.station-card').forEach(c=>c.classList.toggle('selected',parseInt(c.dataset.id)===s.id));
  map.flyTo([s.lat,s.lng],15,{duration:1});
  const m=markers[s.id];
  if(m) clusterGroup.zoomToShowLayer(m,()=>m.openPopup());
}

// ── LOCATE ────────────────────────────────────────────────────────────────────
function locate(){
  setStatus('Obteniendo ubicación…');
  navigator.geolocation.getCurrentPosition(pos=>{
    userLatLng={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(userMarker) userMarker.remove();
    userMarker=L.marker([userLatLng.lat,userLatLng.lng],{icon:iconUser,zIndexOffset:1000}).addTo(map).bindPopup('Tu ubicación').openPopup();
    map.flyTo([userLatLng.lat,userLatLng.lng],13,{duration:1.5});
    updateDistances();
    setStatus(`Ubicación activa · radio ${radiusKm} km`);
    renderAll();
  },()=>{setStatus('No se pudo obtener ubicación');alert('Activa el permiso de ubicación.');},{enableHighAccuracy:true});
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  document.getElementById('btn-theme').textContent=isDark?'🌙':'☀️';
  if(isDark){map.removeLayer(tileLight);tileDark.addTo(map);}
  else{map.removeLayer(tileDark);tileLight.addTo(map);}
}

function setStatus(msg){document.getElementById('status-bar').textContent=msg;}

// ── BRANDS ────────────────────────────────────────────────────────────────────
function populateBrands(){
  allBrands=[...new Set(allStations.map(s=>s.brand))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'es'));
}
function renderBrandDropdown(query){
  const dd=document.getElementById('brand-dropdown');
  const q=query.toLowerCase();
  const filtered=q?allBrands.filter(b=>b.toLowerCase().includes(q)):allBrands;
  dd.innerHTML='';
  const allOpt=document.createElement('div');
  allOpt.className='brand-opt'+(!activeBrand?' selected':'');
  allOpt.textContent='Todas las marcas';
  allOpt.addEventListener('click',()=>setActiveBrand(''));
  dd.appendChild(allOpt);
  filtered.slice(0,80).forEach(b=>{
    const opt=document.createElement('div');
    opt.className='brand-opt'+(activeBrand===b?' selected':'');
    opt.textContent=b.charAt(0)+b.slice(1).toLowerCase();
    opt.addEventListener('click',()=>setActiveBrand(b));
    dd.appendChild(opt);
  });
}
function setActiveBrand(b){
  activeBrand=b;
  document.getElementById('brand-clear').classList.toggle('visible',!!b);
  document.getElementById('brand-input').value=b?(b.charAt(0)+b.slice(1).toLowerCase()):'';
  hideBrandDropdown();renderAll();
}
function hideBrandDropdown(){document.getElementById('brand-dropdown').classList.remove('visible');}

// ── LOCATION SEARCH ───────────────────────────────────────────────────────────
const searchInput=document.getElementById('location-search');
const searchResults=document.getElementById('search-results');
const searchClear=document.getElementById('search-clear');
async function searchLocation(q){
  if(q.length<2){hideSearchResults();return;}
  searchResults.innerHTML='<div class="search-loading">Buscando…</div>';
  searchResults.classList.add('visible');
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=es&limit=6&format=json`,{headers:{'Accept-Language':'es'}});
    const data=await res.json();
    if(!data.length){searchResults.innerHTML='<div class="search-loading">Sin resultados</div>';return;}
    searchResults.innerHTML='';
    data.forEach(r=>{
      const name=r.display_name.split(',').slice(0,3).join(', ');
      const item=document.createElement('div');
      item.className='search-result-item';
      item.innerHTML=`<span>📍</span><div><div class="search-result-name">${name}</div><div class="search-result-sub">${r.type||r.class||''}</div></div>`;
      item.addEventListener('click',()=>{
        userLatLng={lat:parseFloat(r.lat),lng:parseFloat(r.lon)};
        updateDistances();
        map.flyTo([userLatLng.lat,userLatLng.lng],13,{duration:1.2});
        if(userMarker) userMarker.remove();
        userMarker=L.marker([userLatLng.lat,userLatLng.lng],{icon:iconUser,zIndexOffset:1000}).addTo(map).bindPopup(r.display_name.split(',')[0]).openPopup();
        searchInput.value=r.display_name.split(',').slice(0,2).join(', ');
        searchClear.classList.add('visible');
        hideSearchResults();
        setStatus(`Radio ${radiusKm} km · ${r.display_name.split(',')[0]}`);
        renderAll();
      });
      searchResults.appendChild(item);
    });
  }catch{searchResults.innerHTML='<div class="search-loading">Error de conexión</div>';}
}
function hideSearchResults(){searchResults.classList.remove('visible');}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('btn-locate').addEventListener('click',locate);
document.getElementById('btn-theme').addEventListener('click',toggleTheme);

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='stats-tab') renderStats();
  });
});

document.getElementById('fuel-pills').addEventListener('click',e=>{
  const pill=e.target.closest('.pill[data-fuel]');if(!pill) return;
  const f=pill.dataset.fuel;
  if(activeFuels.has(f)){if(activeFuels.size===1) return;activeFuels.delete(f);pill.classList.remove('active');}
  else{activeFuels.add(f);pill.classList.add('active');}
  renderAll();
});

document.getElementById('toggle-lc').addEventListener('click',function(){
  onlyLC=!onlyLC;this.classList.toggle('active',onlyLC);
  this.textContent=onlyLC?'✓ Solo low-cost':'Solo low-cost';renderAll();
});

document.getElementById('sort-select').addEventListener('change',e=>{sortMode=e.target.value;renderAll();});
document.getElementById('radius-slider').addEventListener('input',e=>{
  radiusKm=parseInt(e.target.value);
  document.getElementById('radius-val').textContent=radiusKm+' km';
  renderAll();
});

const brandInput=document.getElementById('brand-input');
brandInput.addEventListener('focus',()=>{renderBrandDropdown(brandInput.value);document.getElementById('brand-dropdown').classList.add('visible');});
brandInput.addEventListener('input',()=>{renderBrandDropdown(brandInput.value);document.getElementById('brand-dropdown').classList.add('visible');});
brandInput.addEventListener('keydown',e=>{if(e.key==='Escape') hideBrandDropdown();});
document.getElementById('brand-clear').addEventListener('click',()=>setActiveBrand(''));

searchInput.addEventListener('input',()=>{
  searchClear.classList.toggle('visible',searchInput.value.length>0);
  clearTimeout(searchDebounce);
  searchDebounce=setTimeout(()=>searchLocation(searchInput.value.trim()),350);
});
searchInput.addEventListener('keydown',e=>{if(e.key==='Escape') hideSearchResults();});
searchClear.addEventListener('click',()=>{
  searchInput.value='';searchClear.classList.remove('visible');hideSearchResults();
  userLatLng=null;if(userMarker){userMarker.remove();userMarker=null;}
  allStations.forEach(s=>s.dist=null);
  setStatus(`${allStations.length.toLocaleString('es-ES')} estaciones cargadas`);
  renderAll();
});

document.addEventListener('click',e=>{
  if(!e.target.closest('#search-results')&&!e.target.closest('#location-search')) hideSearchResults();
  if(!e.target.closest('#brand-dropdown')&&!e.target.closest('#brand-input')&&!e.target.closest('#brand-clear')) hideBrandDropdown();
});

document.getElementById('btn-clear-filters').addEventListener('click',()=>{
  activeFuels=new Set(['G95','G98','GOA','GOP','GLP']);
  onlyLC=false;sortMode='dist';activeBrand='';userLatLng=null;
  if(userMarker){userMarker.remove();userMarker=null;}
  allStations.forEach(s=>s.dist=null);
  document.querySelectorAll('#fuel-pills .pill').forEach(p=>p.classList.add('active'));
  const lc=document.getElementById('toggle-lc');lc.classList.remove('active');lc.textContent='Solo low-cost';
  document.getElementById('sort-select').value='dist';
  document.getElementById('brand-input').value='';document.getElementById('brand-clear').classList.remove('visible');
  searchInput.value='';searchClear.classList.remove('visible');
  setStatus(`${allStations.length.toLocaleString('es-ES')} estaciones cargadas`);
  map.setView([40.4,-3.7],6);renderAll();
});

loadStations();
</script>
