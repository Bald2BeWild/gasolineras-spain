name: Actualizar precios de carburantes

on:
  schedule:
    # Cada día a las 8:15 AM hora española (UTC+1/+2)
    - cron: '15 7 * * *'
  workflow_dispatch: # Permite lanzarlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Descargar datos del Ministerio
        run: node scripts/fetch-data.js
        timeout-minutes: 5

      - name: Verificar que data.json se generó correctamente
        run: |
          if [ ! -f data.json ]; then
            echo "❌ ERROR: data.json no se generó"
            exit 1
          fi
          SIZE=$(wc -c < data.json)
          echo "✅ data.json generado: ${SIZE} bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ ERROR: data.json demasiado pequeño (${SIZE} bytes)"
            exit 1
          fi
          node -e "const d=require('./data.json');console.log('✅ Estaciones:', d.stations?.length)"

      - name: Generar páginas estáticas por ciudad
        run: node scripts/generate-cities.js
        continue-on-error: true

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json sitemap.xml
          git add ciudades/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🔄 Precios actualizados $(date +'%d/%m/%Y %H:%M UTC')"
          git push
