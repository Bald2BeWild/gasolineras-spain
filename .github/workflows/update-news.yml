name: Update News Feed

on:
  schedule:
    # Cada 6 horas
    - cron: '0 */6 * * *'
  # También permite lanzarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch news feeds and generate news.json
        run: |
          cat > fetch_news.py << 'PYEOF'
          import urllib.request
          import json
          import re
          from datetime import datetime, timezone
          from xml.etree import ElementTree as ET
          
          FEEDS = [
              'https://news.google.com/rss/search?q=precio+gasolina+Espa%C3%B1a&hl=es&gl=ES&ceid=ES:es',
              'https://news.google.com/rss/search?q=precio+petroleo+crudo&hl=es&gl=ES&ceid=ES:es',
              'https://news.google.com/rss/search?q=gasolineras+low+cost&hl=es&gl=ES&ceid=ES:es',
              'https://news.google.com/rss/search?q=IVA+hidrocarburos+impuesto+carburantes&hl=es&gl=ES&ceid=ES:es',
          ]
          
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (compatible; LlenoPorFavor/1.0; +https://llenoporfavor.app)',
              'Accept': 'application/rss+xml, application/xml, text/xml',
          }
          
          def clean_title(title):
              # Google News appends " - Source Name" at the end
              return re.sub(r'\s+[-\u2013]\s+[^-\u2013]+$', '', title or '').strip()
          
          def parse_feed(url):
              try:
                  req = urllib.request.Request(url, headers=HEADERS)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      xml_text = resp.read().decode('utf-8', errors='replace')
                  
                  root = ET.fromstring(xml_text)
                  channel = root.find('channel')
                  if channel is None:
                      return []
                  
                  items = []
                  for item in channel.findall('item'):
                      title_el = item.find('title')
                      link_el = item.find('link')
                      pub_el = item.find('pubDate')
                      source_el = item.find('source')
                      
                      title = clean_title(title_el.text if title_el is not None else '')
                      link = link_el.text if link_el is not None and link_el.text else '#'
                      pub_date = pub_el.text if pub_el is not None else ''
                      source = (source_el.text if source_el is not None else '') or 'Google News'
                      
                      if not title:
                          continue
                      
                      items.append({
                          'title': title,
                          'link': link,
                          'source': source.strip(),
                          'pubDate': pub_date,
                      })
                  return items
              except Exception as e:
                  print(f'Error fetching {url}: {e}')
                  return []
          
          # Fetch all feeds
          all_items = []
          for feed_url in FEEDS:
              items = parse_feed(feed_url)
              print(f'Fetched {len(items)} items from {feed_url}')
              all_items.extend(items)
          
          # Deduplicate by title (first 40 chars normalized)
          seen = set()
          unique = []
          for item in all_items:
              key = re.sub(r'\s+', ' ', item['title'].lower())[:40]
              if key in seen:
                  continue
              seen.add(key)
              unique.append(item)
          
          # Sort by date descending
          def parse_date(d):
              try:
                  # RFC 822 format: "Tue, 15 Apr 2026 10:30:00 GMT"
                  from email.utils import parsedate_to_datetime
                  return parsedate_to_datetime(d)
              except:
                  return datetime.min.replace(tzinfo=timezone.utc)
          
          unique.sort(key=lambda x: parse_date(x['pubDate']), reverse=True)
          
          # Keep top 20
          top = unique[:20]
          
          output = {
              'updated': datetime.now(timezone.utc).isoformat(),
              'count': len(top),
              'items': top,
          }
          
          with open('news.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          
          print(f'\nGenerated news.json with {len(top)} unique items')
          PYEOF
          
          python3 fetch_news.py

      - name: Commit news.json
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Update news.json"
            git push
          fi
